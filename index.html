<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Angle Explorer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
      background-attachment: fixed;
    }
    header {
      background: #3949ab;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 { margin: 0; }

    .angle-label {
      font-size: 36px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin: 20px 0;
    }

    .main-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      margin-top: 20px;
    }

    .angle-box {
      width: 500px;
      height: 500px;
      border: 5px solid #3949ab;
      border-radius: 40px;
      background: #ffffffcc;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    svg { width: 450px; height: 450px; }

    .controls {
      width: 500px;
      border: 4px solid #3949ab;
      border-radius: 25px;
      background: #ffffffcc;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      padding: 25px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .slider-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      margin-top: 20px;
    }
    input[type=range] {
      flex: 1;
      height: 24px;
      background: white;
      border-radius: 12px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 8px;
      background: #ccc;
      border-radius: 4px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 32px; height: 32px;
      background: #3949ab;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid white;
      margin-top: -12px;
    }

    input[type=number] {
      width: 120px;
      padding: 12px;
      font-size: 26px;
      border: 3px solid #3949ab;
      border-radius: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Interactive Angle Explorer</h1>
  </header>

  <!-- Restored angle type label -->
  <div class="angle-label" id="angleLabel">Right Angle (90°)</div>

  <div class="main-container">
    <!-- Left side: angle box -->
    <div class="angle-box">
      <svg id="angleSVG">
        <line x1="225" y1="225" x2="400" y2="225" stroke="black" stroke-width="6"/>
        <line id="movableLine" x1="225" y1="225" x2="225" y2="75" stroke="red" stroke-width="6" marker-end="url(#arrowhead)"/>
        <path id="arcPath" d="" stroke="blue" stroke-width="4" fill="none"/>
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
            <polygon points="0 0, 8 4, 0 8" fill="red"/>
          </marker>
        </defs>
      </svg>
    </div>

    <!-- Right side: controls -->
    <div class="controls">
      <label style="font-size:30px;">Angle:</label>
      <div class="slider-box">
        <input type="range" id="angleSlider" min="0" max="360" value="90" step="1">
        <input type="number" id="angleInput" min="0" max="360" value="90">°
      </div>
    </div>
  </div>

  <script>
    const slider = document.getElementById('angleSlider');
    const input = document.getElementById('angleInput');
    const line = document.getElementById('movableLine');
    const arc = document.getElementById('arcPath');
    const label = document.getElementById('angleLabel');

    // Snap points for key angles
    const snapPoints = [0, 90, 180, 360];
    const snapThreshold = 5; // snap if within 5 degrees

    function updateAngle(angle) {
      const rad = angle * Math.PI / 180;
      const length = 150;
      const x = 225 + length * Math.cos(rad);
      const y = 225 - length * Math.sin(rad);

      line.setAttribute('x2', x);
      line.setAttribute('y2', y);

      const arcRadius = 60;
      const largeArcFlag = angle > 180 ? 1 : 0;
      const arcX = 225 + arcRadius * Math.cos(rad);
      const arcY = 225 - arcRadius * Math.sin(rad);
      arc.setAttribute('d', `M ${225+arcRadius} ${225} A ${arcRadius} ${arcRadius} 0 ${largeArcFlag} 0 ${arcX} ${arcY}`);

      let type = "";
      if (angle === 0) type = "Zero Angle";
      else if (angle > 0 && angle < 90) type = "Acute Angle";
      else if (angle === 90) type = "Right Angle";
      else if (angle > 90 && angle < 180) type = "Obtuse Angle";
      else if (angle === 180) type = "Straight Angle";
      else if (angle > 180 && angle < 360) type = "Reflex Angle";
      else if (angle === 360) type = "Full Angle";

      label.textContent = `${type} (${angle}°)`;
    }

    function snapAngle(val) {
      for (let point of snapPoints) {
        if (Math.abs(val - point) <= snapThreshold) {
          return point;
        }
      }
      return val;
    }

    slider.addEventListener('input', e => {
      let val = snapAngle(parseInt(e.target.value));
      slider.value = val;
      input.value = val;
      updateAngle(val);
    });

    input.addEventListener('input', e => {
      let val = Math.max(0, Math.min(360, parseInt(e.target.value)));
      val = snapAngle(val);
      slider.value = val;
      updateAngle(val);
    });

    updateAngle(90);
  </script>
</body>
</html>
